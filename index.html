<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agência Luka — Marketing 360</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <!-- LOADING SCREEN -->
  <div class="loading-screen" id="loading-screen">
    <div class="loading-screen__watermark" aria-hidden="true"></div>
    <div class="loading-screen__content">
      <img class="loading-screen__logo" src="assets/01. Home/loading-logo.svg" alt="Luka">
    </div>
    <div class="loading-screen__progress">
      <div class="loading-screen__progress-bar"></div>
    </div>
  </div>

  <main>

    <!-- HERO -->
    <section class="hero">
      <div class="hero__inner">
      <div class="hero__bg" style="background-image: url('assets/img-hero-home.png')" aria-hidden="true"></div>
      <div class="hero__overlay" aria-hidden="true"></div>

      <!-- HEADER -->
      <header class="site-header">
        <span class="site-header__copyright">&copy;<span data-year></span></span>
        <a href="#" class="site-header__logo">
          <img src="assets/logo-navbar.svg" alt="Agência Luka">
        </a>
        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="menu-overlay">
          <span class="menu-toggle__label">
            <span class="menu-toggle__open">[ Menu ]</span>
            <span class="menu-toggle__close">[ Fechar ]</span>
          </span>
        </button>
      </header>

      <!-- MENU OVERLAY -->
      <div class="menu-overlay" id="menu-overlay" aria-hidden="true">
        <nav class="menu-overlay__nav">
          <div class="menu-overlay__item">
            <span class="menu-overlay__index">[ 01 ]</span>
            <a href="#" class="menu-overlay__link">Home</a>
          </div>
          <div class="menu-overlay__item">
            <span class="menu-overlay__index">[ 02 ]</span>
            <a href="#" class="menu-overlay__link">Sobre</a>
          </div>
          <div class="menu-overlay__item">
            <span class="menu-overlay__index">[ 03 ]</span>
            <a href="#" class="menu-overlay__link">Serviços</a>
          </div>
          <div class="menu-overlay__item">
            <span class="menu-overlay__index">[ 04 ]</span>
            <a href="#" class="menu-overlay__link">Cases</a>
          </div>
          <div class="menu-overlay__item">
            <span class="menu-overlay__index">[ 05 ]</span>
            <a href="#" class="menu-overlay__link">Iniciativas</a>
          </div>
          <div class="menu-overlay__item">
            <span class="menu-overlay__index">[ 06 ]</span>
            <a href="#" class="menu-overlay__link">Contato</a>
          </div>
        </nav>

        <div class="menu-overlay__footer">
          <div class="menu-overlay__social">
            <a href="#" aria-label="Instagram" style="--icon: url('../assets/icon-instagram.svg')"><img src="assets/icon-instagram.svg" alt="" width="16" height="16"></a>
            <a href="#" aria-label="LinkedIn" style="--icon: url('../assets/icon-linkedin.svg')"><img src="assets/icon-linkedin.svg" alt="" width="16" height="16"></a>
            <a href="#" aria-label="Facebook" style="--icon: url('../assets/icon-facebook.svg')"><img src="assets/icon-facebook.svg" alt="" width="16" height="16"></a>
            <a href="#" aria-label="Pinterest" style="--icon: url('../assets/icon-pinterest.svg')"><img src="assets/icon-pinterest.svg" alt="" width="16" height="16"></a>
          </div>
        </div>
      </div>

      <div class="hero__frame" aria-hidden="true">
        <span class="hero__frame-line hero__frame-line--v-left"></span>
        <span class="hero__frame-line hero__frame-line--v-right"></span>
        <span class="hero__frame-line hero__frame-line--h-top"></span>
        <span class="hero__frame-line hero__frame-line--h-bottom"></span>
        <img class="hero__crosshair hero__crosshair--tl" src="assets/sinal-de-mais.svg" alt="">
        <img class="hero__crosshair hero__crosshair--tr" src="assets/sinal-de-mais.svg" alt="">
        <img class="hero__crosshair hero__crosshair--bl" src="assets/sinal-de-mais.svg" alt="">
        <img class="hero__crosshair hero__crosshair--br" src="assets/sinal-de-mais.svg" alt="">
      </div>

      <div class="hero__content">
        <div class="hero__main">
          <span class="hero__eyebrow">
            <span class="hero__eyebrow-dot" aria-hidden="true"></span>
            Marketing 360
          </span>
          <h1 class="hero__title">Domine o mercado digital com a Luka</h1>
        </div>

        <div class="hero__aside">
          <p class="hero__text">Integramos estratégia, design e performance para construir uma presença digital sólida, relevante e orientada a crescimento.</p>
          <a href="#solucoes" class="btn btn--dark-bg">
            Saiba mais
            <span class="btn__icon">
              <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </span>
          </a>
        </div>
      </div>

      <div class="hero__footer">
        <a href="#solucoes" class="hero__scroll">
          Saiba mais
          <img src="assets/arrow_downward_alt.svg" alt="" width="20" height="20">
        </a>
        <span class="hero__footer-line" aria-hidden="true"></span>
        <div class="hero__socials">
          <a href="#" aria-label="Facebook"><img src="assets/icon-facebook.svg" alt="" width="24" height="24"></a>
          <a href="#" aria-label="LinkedIn"><img src="assets/icon-linkedin.svg" alt="" width="24" height="24"></a>
          <a href="#" aria-label="Instagram"><img src="assets/icon-instagram.svg" alt="" width="24" height="24"></a>
          <a href="#" aria-label="Pinterest"><img src="assets/icon-pinterest.svg" alt="" width="24" height="24"></a>
        </div>
      </div>
      </div>
    </section>

  </main>

  <script src="js/main.js"></script>
</body>
</html>
